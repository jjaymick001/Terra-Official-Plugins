name: openwebui-vllm
user:
group:
session:
_kuiper:
selector: []
env: []
volumes: []
volumeMounts: []
plugins: []
proxy_namespace: ingress-nginx
pullSecret:

model: Qwen/Qwen2.5-0.5B-Instruct
hfSecretName: hf-token-secret
hfSecretKey: HF_TOKEN

vllmImage: vllm/vllm-openai:v0.15.1
openwebuiImage: ghcr.io/open-webui/open-webui:main

vllmReplicas: 2
openwebuiReplicas: 1

gpuCount: "1"
gpuProduct: NVIDIA-A100-PCIE-40GB
nodeHostname: ""

gpuMemoryUtilization: "0.85"
maxModelLen: 8192

webuiAuth: "false"

vllmServiceType: LoadBalancer
openwebuiServiceType: LoadBalancer

vllm:
  port: 8000
  resources:
    limits:
      cpu: "8"
      memory: "32Gi"
      nvidia.com/gpu: "1"

openwebui:
  port: 8080
  resources:
    requests:
      cpu: "1"
      memory: "1Gi"

