apiVersion: v1
kind: Service
metadata:
  name: "{{ .Values.name }}"
  labels:
    juno-innovations.com/app: "polaris"
    juno-innovations.com/workstation: "{{ .Values.name }}"
spec:
  type: {{ .Values.openwebuiServiceType }}
  selector:
    juno-innovations.com/workstation: "{{ .Values.name }}"
  ports:
    - name: viewer
      port: 80
      targetPort: {{ .Values.openwebui.port }}
      protocol: TCP
