apiVersion: v1
kind: Service
metadata:
  name: "{{ .Values.name }}-lls-svc"
  labels:
    juno-innovations.com/workstation: "{{ .Values.name }}"
    juno-innovations.com/app: "openwebui-vllm"
    app.kubernetes.io/component: vllm
spec:
  type: {{ .Values.vllmServiceType }}
  selector:
    juno-innovations.com/workstation: "{{ .Values.name }}"
    app.kubernetes.io/component: vllm
  ports:
    - name: http
      port: {{ .Values.vllm.port }}
      targetPort: {{ .Values.vllm.port }}
