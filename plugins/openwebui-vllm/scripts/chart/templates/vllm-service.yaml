cat > plugins/openwebui-vllm/scripts/chart/templates/vllm-service.yaml <<'EOF'
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-lls-svc
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-vllm
spec:
  type: {{ .Values.vllmServiceType }}
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}-vllm
  ports:
    - name: http
      port: {{ .Values.vllm.port }}
      targetPort: {{ .Values.vllm.port }}
EOF
