apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ .Values.name }}"
  annotations:
    juno-innovations.com/kuiper-state: "{{ .Values._kuiper }}"
    juno-innovations.com/shared: "none"
    juno-innovations.com/workload: "Application"
  labels:
    juno-innovations.com/app: "polaris"
    juno-innovations.com/session: "{{ .Values.session }}"
    juno-innovations.com/user: "{{ .Values.user }}"
    juno-innovations.com/workstation: "{{ .Values.name }}"
    kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
spec:
  serviceName: ""
  replicas: 1
  selector:
    matchLabels:
      juno-innovations.com/workstation: "{{ .Values.name }}"
  template:
    metadata:
      labels:
        juno-innovations.com/app: "polaris"
        juno-innovations.com/user: "{{ .Values.user }}"
        juno-innovations.com/workstation: "{{ .Values.name }}"
        kuiper.juno-innovations.com/kuiper-instance: "{{ .Values.name }}"
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      automountServiceAccountToken: false
      runtimeClassName: nvidia
      hostname: "{{ .Values.name }}"
      {{- if or .Values.gpuProduct .Values.nodeHostname }}
      nodeSelector:
        {{- if .Values.gpuProduct }}
        nvidia.com/gpu.product: {{ .Values.gpuProduct | quote }}
        {{- end }}
        {{- if .Values.nodeHostname }}
        kubernetes.io/hostname: {{ .Values.nodeHostname | quote }}
        {{- end }}
      {{- end }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: juno-innovations.com/workstation
                    operator: In
                    values:
                      - "true"
      tolerations:
        - effect: NoSchedule
          key: juno-innovations.com/workstation
          operator: Exists
      containers:
        - name: vllm
          image: {{ .Values.vllmImage | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hfSecretName | quote }}
                  key: {{ .Values.hfSecretKey | quote }}
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: LD_LIBRARY_PATH
              value: "/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu"
          args:
            - "--model={{ .Values.model }}"
            - "--host=0.0.0.0"
            - "--port={{ .Values.vllm.port }}"
            - "--gpu-memory-utilization={{ .Values.gpuMemoryUtilization }}"
            - "--max-model-len={{ .Values.maxModelLen }}"
          ports:
            - name: vllm
              containerPort: {{ .Values.vllm.port }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /v1/models
              port: {{ .Values.vllm.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 300
          readinessProbe:
            httpGet:
              path: /v1/models
              port: {{ .Values.vllm.port }}
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v1/models
              port: {{ .Values.vllm.port }}
            periodSeconds: 20
            failureThreshold: 6
          resources:
{{ toYaml .Values.vllm.resources | indent 12 }}

        - name: open-webui
          image: {{ .Values.openwebuiImage | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: WEBUI_AUTH
              value: {{ .Values.webuiAuth | quote }}
            - name: OPENAI_API_BASE_URL
              value: "http://127.0.0.1:{{ .Values.vllm.port }}/v1"
            - name: OPENAI_API_KEY
              value: "dummy"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hfSecretName | quote }}
                  key: {{ .Values.hfSecretKey | quote }}
          ports:
            - name: viewer
              containerPort: {{ .Values.openwebui.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.openwebui.port }}
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.openwebui.port }}
            periodSeconds: 10
            failureThreshold: 6
          resources:
{{ toYaml .Values.openwebui.resources | indent 12 }}
