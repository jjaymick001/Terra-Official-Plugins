apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Values.name }}-open-webui"
  annotations:
    juno-innovations.com/kuiper-state: "{{ .Values._kuiper }}"
    juno-innovations.com/workload: "Application"
  labels:
    juno-innovations.com/workstation: "{{ .Values.name }}"
    juno-innovations.com/user: "{{ .Values.user }}"
    juno-innovations.com/session: "{{ .Values.session }}"
    juno-innovations.com/app: "openwebui-vllm"
    app.kubernetes.io/name: "{{ .Values.name }}-open-webui"
spec:
  replicas: {{ .Values.openwebuiReplicas }}
  selector:
    matchLabels:
      juno-innovations.com/workstation: "{{ .Values.name }}"
      app.kubernetes.io/component: open-webui
  template:
    metadata:
      labels:
        juno-innovations.com/workstation: "{{ .Values.name }}"
        juno-innovations.com/user: "{{ .Values.user }}"
        juno-innovations.com/session: "{{ .Values.session }}"
        juno-innovations.com/app: "openwebui-vllm"
        app.kubernetes.io/component: open-webui
        app.kubernetes.io/name: "{{ .Values.name }}-open-webui"
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      initContainers:
        - name: wait-for-vllm
          image: curlimages/curl:8.5.0
          command: ["sh", "-c"]
          args:
            - >
              echo "Waiting for vLLM...";
              until curl -sf http://{{ .Values.name }}-lls-svc:{{ .Values.vllm.port }}/v1/models > /dev/null;
              do sleep 2;
              done;
              echo "vLLM is up.";
      containers:
        - name: open-webui
          image: {{ .Values.openwebuiImage | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: ui
              containerPort: {{ .Values.openwebui.port }}
          env:
            - name: WEBUI_AUTH
              value: {{ .Values.webuiAuth | quote }}
            - name: OPENAI_API_BASE_URL
              value: "http://{{ .Values.name }}-lls-svc:{{ .Values.vllm.port }}/v1"
            - name: OPENAI_API_KEY
              value: "dummy"
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.openwebui.port }}
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.openwebui.port }}
            periodSeconds: 10
            failureThreshold: 6
          resources:
{{ toYaml .Values.openwebui.resources | indent 12 }}
