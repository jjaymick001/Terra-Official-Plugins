apiVersion: v1
kind: Service
metadata:
  name: "{{ .Values.name }}-open-webui-svc"
  labels:
    juno-innovations.com/workstation: "{{ .Values.name }}"
    juno-innovations.com/app: "openwebui-vllm"
    app.kubernetes.io/component: open-webui
spec:
  type: {{ .Values.openwebuiServiceType }}
  selector:
    juno-innovations.com/workstation: "{{ .Values.name }}"
    app.kubernetes.io/component: open-webui
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.openwebui.port }}
