apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  annotations:
    juno-innovations.com/workload: "Application"
spec:
  replicas: {{ .Values.vllmReplicas }}
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      enableServiceLinks: false
      {{- if or .Values.gpuProduct .Values.nodeHostname }}
      nodeSelector:
        {{- if .Values.gpuProduct }}
        nvidia.com/gpu.product: {{ .Values.gpuProduct | quote }}
        {{- end }}
        {{- if .Values.nodeHostname }}
        kubernetes.io/hostname: {{ .Values.nodeHostname | quote }}
        {{- end }}
      {{- end }}
      containers:
        - name: vllm
          image: {{ .Values.vllmImage }}
          imagePullPolicy: IfNotPresent
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hfSecretName }}
                  key: {{ .Values.hfSecretKey }}
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: LD_LIBRARY_PATH
              value: "/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu"
          args:
            - "--model={{ .Values.model }}"
            - "--host=0.0.0.0"
            - "--port=8000"
            - "--gpu-memory-utilization={{ .Values.gpuMemoryUtilization }}"
            - "--max-model-len={{ .Values.maxModelLen }}"
          ports:
            - containerPort: 8000
              name: http
          startupProbe:
            httpGet:
              path: /v1/models
              port: 8000
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            periodSeconds: 20
            failureThreshold: 6
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.gpuCount | quote }}
              cpu: {{ .Values.resources.vllm.cpu | quote }}
              memory: {{ .Values.resources.vllm.memory | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: lls-svc
spec:
  type: {{ .Values.vllmServiceType }}
  selector:
    app: vllm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  annotations:
    juno-innovations.com/workload: "Application"
spec:
  replicas: {{ .Values.openwebuiReplicas }}
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      initContainers:
        - name: wait-for-vllm
          image: curlimages/curl:8.5.0
          command: ["sh", "-c"]
          args:
            - >
              echo "Waiting for vLLM...";
              until curl -sf http://lls-svc:8000/v1/models > /dev/null;
              do sleep 2;
              done;
              echo "vLLM is up.";
      containers:
        - name: open-webui
          image: {{ .Values.openwebuiImage }}
          ports:
            - containerPort: 8080
          env:
            - name: WEBUI_AUTH
              value: {{ ternary "True" "False" .Values.webuiAuth | quote }}
            - name: OPENAI_API_BASE_URL
              value: "http://lls-svc:8000/v1"
            - name: OPENAI_API_KEY
              value: "dummy"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui-svc
spec:
  selector:
    app: open-webui
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: {{ .Values.openwebuiServiceType }}
